name: Bug report
description: Report a bug in invossh
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Do **not** include real passwords, tokens, or private keys.
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Steps to reproduce, expected vs actual.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: invossh version
      placeholder: "invossh version"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options: [Linux, Windows, macOS, other]
    validations:
      required: true
